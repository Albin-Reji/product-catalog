spring:
  application:
    name: product-catalog
# db config
  datasource:
    url: jdbc://postgresql:localhost:5432/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
# port
server:
  port: 8081
